name: Analyze Jobs

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Resume profile to use'
        required: true
        type: choice
        options:
          - ml_engineer
          - backend_engineer
          - software_engineer
        default: 'ml_engineer'
      limit:
        description: 'Max jobs to analyze'
        required: false
        default: '20'

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run job analyzer
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python matcher.py --profile ${{ inputs.profile }} --limit ${{ inputs.limit }}