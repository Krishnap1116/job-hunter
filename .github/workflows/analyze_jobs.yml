# .github/workflows/analyze_jobs.yml

name: Analyze Jobs

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Resume profile to use'
        required: true
        type: choice
        options:
          - ml_engineer
          - swe
        default: 'ml_engineer'
      analyze_all:
        description: 'Analyze all jobs from today?'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'
      limit:
        description: 'If "no" above, max jobs to analyze'
        required: false
        default: '50'

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run job analyzer
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.analyze_all }}" = "yes" ]; then
            echo "📋 Analyzing ALL jobs from today"
            python matcher.py --profile ${{ inputs.profile }} --limit 0
          else
            echo "📋 Analyzing up to ${{ inputs.limit }} jobs"
            python matcher.py --profile ${{ inputs.profile }} --limit ${{ inputs.limit }}
          fi